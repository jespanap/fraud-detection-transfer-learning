<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 760" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fafc"/>
    </linearGradient>
    <linearGradient id="srcA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ebf4ff"/>
      <stop offset="100%" stop-color="#bee3f8"/>
    </linearGradient>
    <linearGradient id="srcB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6fffa"/>
      <stop offset="100%" stop-color="#b2f5ea"/>
    </linearGradient>
    <linearGradient id="tokGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#fbd38d"/>
    </linearGradient>
    <linearGradient id="attnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#d6bcfa"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5f5"/>
      <stop offset="100%" stop-color="#feb2b2"/>
    </linearGradient>
    <linearGradient id="outGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fff4"/>
      <stop offset="100%" stop-color="#9ae6b4"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2d3748"/>
    </marker>
  </defs>

  <rect width="1320" height="760" fill="url(#bg)"/>

  <!-- Title -->
  <text x="660" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#1a365d">Proposed Architecture — FT-Transformer for Tabular Fraud Detection</text>
  <text x="660" y="68" text-anchor="middle" font-size="13" fill="#4a5568">Feature tokenization → self-attention over features → classification head → P(fraud | x)</text>

  <!-- ===== COL 1: INPUTS ===== -->
  <text x="180" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#2d3748">Input Features</text>

  <!-- Numerical -->
  <rect x="40" y="124" width="280" height="140" rx="10" fill="url(#srcA)" stroke="#2c5282" stroke-width="2"/>
  <text x="180" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#1a365d">Numerical Features</text>
  <text x="180" y="174" text-anchor="middle" font-size="12" fill="#2c5282">~370 continuous columns</text>
  <text x="180" y="196" text-anchor="middle" font-size="11" fill="#2d3748">TransactionAmt · TransactionDT</text>
  <text x="180" y="212" text-anchor="middle" font-size="11" fill="#2d3748">V1–V339 · addr1 · addr2 · dist…</text>
  <text x="180" y="254" text-anchor="middle" font-size="11" fill="#2c5282" font-style="italic">Standard-scaled · NaN → median impute</text>

  <!-- Categorical -->
  <rect x="40" y="296" width="280" height="140" rx="10" fill="url(#srcB)" stroke="#2c7a7b" stroke-width="2"/>
  <text x="180" y="322" text-anchor="middle" font-size="14" font-weight="700" fill="#234e52">Categorical Features</text>
  <text x="180" y="346" text-anchor="middle" font-size="12" fill="#2c7a7b">~30 discrete columns</text>
  <text x="180" y="368" text-anchor="middle" font-size="11" fill="#2d3748">ProductCD · card1–card6</text>
  <text x="180" y="384" text-anchor="middle" font-size="11" fill="#2d3748">P_emaildomain · DeviceType…</text>
  <text x="180" y="426" text-anchor="middle" font-size="11" fill="#234e52" font-style="italic">NaN → dedicated [UNK] token embedding</text>

  <!-- Arrows to tokenizer -->
  <line x1="324" y1="194" x2="398" y2="290" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="324" y1="366" x2="398" y2="366" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== COL 2: FEATURE TOKENIZER ===== -->
  <text x="558" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#2d3748">Feature Tokenizer</text>

  <rect x="402" y="220" width="310" height="290" rx="10" fill="url(#tokGrad)" stroke="#c05621" stroke-width="2"/>
  <text x="557" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#7b341e">Per-Feature Tokenization</text>
  <line x1="422" y1="262" x2="692" y2="262" stroke="#c05621" stroke-width="0.5" stroke-dasharray="3,3"/>

  <text x="557" y="288" text-anchor="middle" font-size="12" fill="#2d3748">Numerical: xᵢ × Wᵢ + bᵢ  →  token ∈ ℝᵈ</text>
  <text x="557" y="312" text-anchor="middle" font-size="11" fill="#4a5568">(per-feature linear projection, learned)</text>

  <text x="557" y="340" text-anchor="middle" font-size="12" fill="#2d3748">Categorical: lookup embedding table Eᵢ ∈ ℝᵛˣᵈ</text>
  <text x="557" y="364" text-anchor="middle" font-size="11" fill="#4a5568">(vocab size v per feature, d = 64–256)</text>

  <text x="557" y="394" text-anchor="middle" font-size="12" fill="#2d3748">[CLS] token prepended to sequence</text>
  <text x="557" y="418" text-anchor="middle" font-size="11" fill="#4a5568">(learnable global representation anchor)</text>

  <text x="557" y="450" text-anchor="middle" font-size="12" fill="#2d3748">Output shape: (N_features + 1, d)</text>
  <text x="557" y="490" text-anchor="middle" font-size="11" fill="#7b341e" font-style="italic">All features live in the same embedding space</text>

  <!-- Arrows to transformer -->
  <line x1="714" y1="290" x2="796" y2="210" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="714" y1="430" x2="796" y2="450" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== COL 3: TRANSFORMER + HEAD ===== -->
  <text x="1000" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#2d3748">Transformer Backbone + Head</text>

  <!-- Transformer block -->
  <rect x="800" y="124" width="480" height="210" rx="10" fill="url(#attnGrad)" stroke="#6b46c1" stroke-width="2"/>
  <text x="1040" y="152" text-anchor="middle" font-size="15" font-weight="700" fill="#44337a">Transformer Block × L layers</text>
  <line x1="820" y1="164" x2="1260" y2="164" stroke="#6b46c1" stroke-width="0.5" stroke-dasharray="3,3"/>

  <text x="1040" y="190" text-anchor="middle" font-size="12" fill="#2d3748">Multi-head self-attention (h = 4–8 heads)</text>
  <text x="1040" y="212" text-anchor="middle" font-size="11" fill="#4a5568">Attention(Q,K,V) = softmax(QKᵀ/√d)V</text>
  <text x="1040" y="236" text-anchor="middle" font-size="12" fill="#2d3748">Layer Norm + residual connection</text>
  <text x="1040" y="258" text-anchor="middle" font-size="12" fill="#2d3748">Position-wise FFN: Linear → GELU → Linear</text>
  <text x="1040" y="280" text-anchor="middle" font-size="11" fill="#4a5568">Dropout p = 0.0–0.3 · L = 2–6 blocks</text>
  <text x="1040" y="320" text-anchor="middle" font-size="11" fill="#44337a" font-style="italic">Learns cross-feature interactions automatically — no manual engineering</text>

  <!-- Arrow down -->
  <line x1="1040" y1="338" x2="1040" y2="370" stroke="#2d3748" stroke-width="2" marker-end="url(#arr)"/>

  <!-- CLS pooling -->
  <rect x="800" y="374" width="480" height="90" rx="10" fill="url(#tokGrad)" stroke="#c05621" stroke-width="2"/>
  <text x="1040" y="400" text-anchor="middle" font-size="15" font-weight="700" fill="#7b341e">[CLS] Token Pooling</text>
  <text x="1040" y="424" text-anchor="middle" font-size="12" fill="#2d3748">Extract [CLS] output → global transaction vector ∈ ℝᵈ</text>
  <text x="1040" y="448" text-anchor="middle" font-size="11" fill="#7b341e" font-style="italic">This embedding is reused during transfer learning</text>

  <!-- Arrow down -->
  <line x1="1040" y1="468" x2="1040" y2="500" stroke="#2d3748" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Dense head -->
  <rect x="800" y="504" width="480" height="100" rx="10" fill="url(#headGrad)" stroke="#c53030" stroke-width="2"/>
  <text x="1040" y="530" text-anchor="middle" font-size="15" font-weight="700" fill="#742a2a">Classification Head</text>
  <text x="1040" y="554" text-anchor="middle" font-size="12" fill="#2d3748">Linear(d, 128) → Dropout → ReLU → Linear(128, 1)</text>
  <text x="1040" y="576" text-anchor="middle" font-size="11" fill="#4a5568">Loss: weighted BCE or Focal Loss (γ=2, α=0.25)</text>
  <text x="1040" y="596" text-anchor="middle" font-size="11" fill="#742a2a" font-style="italic">Threshold calibrated on validation PR curve</text>

  <!-- Arrow down -->
  <line x1="1040" y1="608" x2="1040" y2="638" stroke="#2d3748" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="870" y="642" width="340" height="50" rx="10" fill="url(#outGrad)" stroke="#2f855a" stroke-width="2"/>
  <text x="1040" y="664" text-anchor="middle" font-size="14" font-weight="700" fill="#22543d">σ(z)  →  P(fraud | x)  ∈ [0, 1]</text>
  <text x="1040" y="682" text-anchor="middle" font-size="11" fill="#22543d">Evaluated on ROC-AUC · PR-AUC · Recall · Precision</text>

  <!-- ===== FOOTER ===== -->
  <rect x="40" y="712" width="1240" height="38" rx="10" fill="#edf2f7" stroke="#4a5568" stroke-width="1"/>
  <text x="660" y="727" text-anchor="middle" font-size="13" font-weight="700" fill="#1a365d">Key advantage over the base pipeline</text>
  <text x="660" y="743" text-anchor="middle" font-size="12" fill="#2d3748">The Transformer attends jointly over all ~400 features per transaction, discovering non-linear interactions and producing transferable embeddings — no hand-crafted features required.</text>
</svg>
